<style>
  :root{
    --bg:#161b19;
    --bg-card:#1f2724;
    --bg-card2:#242e2a;
    --line:#33403a;
    --ink:#eef2ef;
    --ink-dim:#9db0a6;
    --amber:#e3a23a;
    --sage:#7bbf9e;
    --red:#d97b6c;
    --radius:12px;
  }
  body.light{
    --bg:#f4f6f4;
    --bg-card:#ffffff;
    --bg-card2:#eef1ee;
    --line:#dbe2dd;
    --ink:#1c211e;
    --ink-dim:#657266;
    --amber:#b9761f;
    --sage:#2f8f63;
    --red:#c04a3a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    -webkit-tap-highlight-color:transparent;
    padding-bottom:190px;
    transition:background 0.2s, color 0.2s;
  }
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  header{
    padding:18px 16px 12px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    position:relative;
  }
  header h1{margin:0;font-size:19px;font-weight:700;}
  header .sub{color:var(--ink-dim);font-size:12px;margin-top:2px;}
  header .header-actions{
    display:flex;
    align-items:center;
    gap:4px;
    flex-shrink:0;
    margin-left:10px;
  }
  header .icon-btn{
    background:transparent;
    border:none;
    color:var(--ink);
    font-size:18px;
    width:34px;
    height:34px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  header .icon-btn:active{background:var(--bg-card2);}
  .menu-wrap{position:relative;}
  .menu-dropdown{
    position:absolute;
    top:40px;right:0;
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:10px;
    min-width:150px;
    box-shadow:0 6px 18px rgba(0,0,0,0.3);
    display:none;
    z-index:60;
    overflow:hidden;
  }
  .menu-dropdown.show{display:block;}
  .menu-dropdown button{
    width:100%;
    text-align:left;
    background:transparent;
    border:none;
    color:var(--ink);
    padding:11px 14px;
    font-size:13.5px;
    font-weight:600;
  }
  .menu-dropdown button:active{background:var(--bg-card2);}

  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    align-items:flex-end;
    z-index:100;
  }
  .modal-overlay.show{display:flex;}
  .modal-sheet{
    background:var(--bg);
    width:100%;
    max-height:80vh;
    border-radius:16px 16px 0 0;
    padding:16px 16px calc(16px + env(safe-area-inset-bottom));
    overflow-y:auto;
  }
  .modal-sheet h2{margin:0 0 4px;font-size:17px;}
  .modal-sheet .modal-close{
    position:absolute;
    top:14px;right:16px;
    background:transparent;
    border:none;
    color:var(--ink-dim);
    font-size:20px;
  }
  .modal-sheet-header{position:relative;padding-right:30px;margin-bottom:10px;}
  .hist-item{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:8px;
  }
  .hist-item .hist-top{display:flex;justify-content:space-between;align-items:center;}
  .hist-item .hist-cliente{font-weight:700;font-size:14px;}
  .hist-item .hist-total{color:var(--amber);font-weight:700;font-size:14px;}
  .hist-item .hist-meta{color:var(--ink-dim);font-size:11.5px;margin-top:2px;}
  .hist-item .hist-items{color:var(--ink-dim);font-size:12px;margin-top:6px;line-height:1.5;}
  .hist-item .hist-del{
    background:transparent;border:none;color:var(--red);font-size:12px;
    margin-top:6px;padding:0;font-weight:600;
  }
  .hist-empty{color:var(--ink-dim);font-size:13px;text-align:center;padding:24px 0;}
  .hist-clear{
    width:100%;background:transparent;border:1px solid var(--red);color:var(--red);
    padding:9px;border-radius:9px;font-weight:600;font-size:13px;margin-top:6px;
  }

  main{padding:12px 14px;}

  .col-labels{
    display:grid;
    grid-template-columns: 1fr 92px 54px 68px 24px;
    gap:6px;
    padding:0 4px 6px;
    color:var(--ink-dim);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.4px;
  }
  .col-labels span:nth-child(2), .col-labels span:nth-child(3){text-align:center;}
  .col-labels span:nth-child(4){text-align:right;}

  .item{
    display:grid;
    grid-template-columns: 1fr 92px 54px 68px 24px;
    gap:6px;
    align-items:center;
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:9px 8px;
    margin-bottom:7px;
  }
  .item.has-qty{border-color:var(--amber);}
  .item input.name{
    background:transparent;
    border:none;
    color:var(--ink);
    font-size:14px;
    font-weight:600;
    padding:4px 2px;
    width:100%;
    min-width:0;
  }
  .item input.name:focus{outline:none;}
  .item .price-wrap{
    display:flex;align-items:center;justify-content:flex-end;
    gap:5px;
    background:var(--bg-card2);
    border-radius:8px;
    padding:0 6px;
    min-height:34px;
  }
  .item .price-wrap span.currency{color:var(--ink-dim);font-size:12px;}
  .item .price-display{
    color:var(--amber);
    font-size:13.5px;
    font-weight:600;
    padding:8px 0;
    flex:1;
    text-align:right;
    min-width:0;
  }
  .item input.price{
    background:transparent;
    border:none;
    color:var(--amber);
    font-size:13.5px;
    font-weight:600;
    padding:8px 2px;
    width:100%;
    text-align:right;
    min-width:0;
  }
  .item input.price:focus{outline:none;}
  .item .edit-price{
    background:transparent;
    border:none;
    color:var(--ink-dim);
    font-size:13px;
    padding:4px;
    flex-shrink:0;
    line-height:1;
  }
  .item .edit-price:active{color:var(--amber);}
  .item input.qty{
    background:var(--bg-card2);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--ink);
    font-size:15px;
    font-weight:700;
    text-align:center;
    padding:8px 2px;
    width:100%;
  }
  .item input.qty:focus{outline:none;border-color:var(--amber);}
  .item .subtotal{
    text-align:right;
    font-size:13.5px;
    font-weight:700;
    color:var(--sage);
  }
  .item .rm{
    background:transparent;
    border:none;
    color:var(--red);
    font-size:16px;
    padding:2px;
  }

  .add-row{
    width:100%;
    background:transparent;
    border:1px dashed var(--line);
    color:var(--ink-dim);
    border-radius:10px;
    padding:12px;
    font-size:13.5px;
    font-weight:600;
    margin-top:4px;
  }

  .bottom{
    position:fixed;
    bottom:0;left:0;right:0;
    background:var(--bg-card);
    border-top:1px solid var(--line);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  }
  .bottom .row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;}
  .bottom .row .label{color:var(--ink-dim);font-size:12.5px;}
  .bottom .row.total .amount{font-size:23px;font-weight:800;color:var(--amber);}
  .bottom .recibido-wrap{display:flex;align-items:center;gap:8px;}
  .bottom .recibido-wrap span{color:var(--ink-dim);font-size:12.5px;}
  .bottom input.recibido{
    background:var(--bg-card2);
    border:1px solid var(--line);
    color:var(--ink);
    border-radius:8px;
    padding:7px 9px;
    font-size:14px;
    font-weight:600;
    width:100px;
    text-align:right;
  }
  .bottom input.recibido:focus{outline:none;border-color:var(--amber);}
  .bottom .row.vuelto .amount{font-size:17px;font-weight:700;color:var(--sage);}
  .bottom .row.vuelto .amount.negativo{color:var(--red);}
  .bottom button.clear{
    width:100%;
    background:transparent;
    border:1px solid var(--red);
    color:var(--red);
    padding:9px;
    border-radius:9px;
    font-weight:600;
    font-size:13.5px;
    margin-top:8px;
  }

  .toast{
    position:fixed;
    top:14px;left:50%;
    transform:translateX(-50%) translateY(-10px);
    background:var(--sage);
    color:#0e1a15;
    padding:8px 16px;
    border-radius:20px;
    font-size:12.5px;
    font-weight:600;
    opacity:0;
    pointer-events:none;
    transition:all 0.25s;
    z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .sync-note{color:var(--ink-dim);font-size:10.5px;text-align:center;padding:8px 0 4px;}
</style>
</head>
<body>

<header>
  <div>
    <h1>Mis cuentas Mipyme</h1>
    <div class="sub">Precio y cantidad se ponen aquí mismo — el total se calcula solo</div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="temaBtn" onclick="alternarTema()" title="Cambiar tema">🌙</button>
    <div class="menu-wrap">
      <button class="icon-btn" onclick="toggleMenu()" title="Menú">⋮</button>
      <div class="menu-dropdown" id="menuDropdown">
        <button onclick="abrirHistorial()">🕘 Historial</button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="col-labels">
    <span>Producto</span><span>Precio</span><span>Cant.</span><span>Subtotal</span><span></span>
  </div>
  <div id="lista"></div>
  <button class="add-row" onclick="agregarProducto()">+ Agregar producto</button>
  <div class="sync-note">Esta lista se ve igual desde cualquier teléfono que abra este enlace.</div>
</main>

<div class="bottom">
  <div class="row total">
    <span class="label">Total a cobrar</span>
    <span class="amount num" id="totalAmount">$0.00</span>
  </div>
  <div class="row">
    <div class="recibido-wrap">
      <span>Recibido</span>
      <input type="number" inputmode="decimal" class="recibido" id="recibido" placeholder="$0.00" oninput="renderTotales()">
    </div>
  </div>
  <div class="row vuelto">
    <span class="label">Diferencia</span>
    <span class="amount num" id="vueltoAmount">$0.00</span>
  </div>
  <div class="row" style="gap:8px;">
    <input type="text" id="clienteNombre" placeholder="Cliente (nombre y apellidos)" style="flex:1;background:var(--bg-card2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 9px;font-size:13px;min-width:0;">
    <input type="text" inputmode="numeric" id="clienteNumero" placeholder="No." style="width:112px;background:var(--bg-card2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 9px;font-size:13px;">
  </div>
  <button class="clear" style="border-color:var(--sage);color:var(--sage);margin-top:8px;" onclick="guardarVenta()">Guardar</button>
  <button class="clear" onclick="limpiarCuenta()">Nueva cuenta</button>
</div>

<div class="modal-overlay" id="histOverlay">
  <div class="modal-sheet">
    <div class="modal-sheet-header">
      <h2>Historial de ventas</h2>
      <button class="modal-close" onclick="cerrarHistorial()">✕</button>
    </div>
    <div id="histLista"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let productos = [];
let editando = new Set();

const BASICOS = ["Pollo","Arroz","Frijoles","Aceite","Azúcar","Café","Pasta","Huevos","Jabón","Detergente"];

function cargarDatos(){
  try{
    const raw = localStorage.getItem('productos_caja_v2');
    productos = raw ? JSON.parse(raw) : null;
  }catch(e){ productos = null; }
  if(!productos || productos.length===0){
    productos = BASICOS.map((n,i)=>({id:'p_'+i, nombre:n, precio:0, cantidad:0}));
    guardar();
  }
  render();
}
function guardar(){
  try{
    localStorage.setItem('productos_caja_v2', JSON.stringify(productos));
  }catch(e){ /* almacenamiento no disponible */ }
}

function fmt(n){
  return '$' + (Math.round(n*100)/100).toLocaleString('es', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function mostrarToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1500);
}

function agregarProducto(){
  productos.push({id:'p_'+Date.now(), nombre:'', precio:0, cantidad:0});
  guardar();
  render();
  const inputs = document.querySelectorAll('input.name');
  if(inputs.length) inputs[inputs.length-1].focus();
}

function eliminarProducto(id){
  productos = productos.filter(p=>p.id!==id);
  guardar();
  render();
}

function actualizarCampo(id, campo, valor){
  const p = productos.find(x=>x.id===id);
  if(!p) return;
  if(campo==='nombre'){
    p.nombre = valor;
  } else {
    const num = parseFloat(valor);
    p[campo] = num>0 ? num : 0;
  }
  guardar();
  if(campo==='precio'){
    editando.delete(id);
    render();
  } else {
    if(campo==='cantidad'){
      const fila = document.querySelector(`.item input.qty[oninput*="'${id}'"]`)?.closest('.item');
      if(fila){
        const sub = (p.cantidad||0) * (p.precio||0);
        const subEl = fila.querySelector('.subtotal');
        if(subEl) subEl.textContent = sub>0 ? fmt(sub) : '';
        fila.classList.toggle('has-qty', p.cantidad>0);
      }
    }
    renderTotales();
  }
}

function editarPrecio(id){
  editando.add(id);
  render();
  setTimeout(()=>{
    const el = document.querySelector(`.item input.price[data-id="${id}"]`);
    if(el){ el.focus(); el.select(); }
  }, 0);
}

function confirmarPrecio(id, valor){
  actualizarCampo(id, 'precio', valor);
}

function limpiarCuenta(){
  productos.forEach(p=>p.cantidad=0);
  editando.clear();
  document.getElementById('recibido').value='';
  guardar();
  render();
  mostrarToast('Cuenta nueva');
}

function render(){
  const cont = document.getElementById('lista');
  if(productos.length===0){
    cont.innerHTML = '';
  } else {
    cont.innerHTML = productos.map(p=>{
      const sub = (p.cantidad||0) * (p.precio||0);
      const enEdicion = editando.has(p.id);
      const precioHtml = enEdicion
        ? `<input class="price" data-id="${p.id}" type="number" inputmode="decimal" value="${p.precio||''}" placeholder="0"
             onblur="confirmarPrecio('${p.id}',this.value)"
             onkeydown="if(event.key==='Enter'){this.blur();}">`
        : `<span class="price-display num" onclick="editarPrecio('${p.id}')">${(p.precio||0).toFixed(2)}</span>
           <button class="edit-price" onclick="editarPrecio('${p.id}')">✎</button>`;
      return `
        <div class="item ${p.cantidad>0?'has-qty':''}">
          <input class="name" value="${p.nombre}" placeholder="Producto" onchange="actualizarCampo('${p.id}','nombre',this.value)">
          <div class="price-wrap">
            <span class="currency">$</span>
            ${precioHtml}
          </div>
          <input class="qty" type="number" inputmode="numeric" value="${p.cantidad||''}" placeholder="0" oninput="actualizarCampo('${p.id}','cantidad',this.value)">
          <div class="subtotal num">${sub>0?fmt(sub):''}</div>
          <button class="rm" onclick="eliminarProducto('${p.id}')">✕</button>
        </div>
      `;
    }).join('');
  }
  renderTotales();
}

function renderTotales(){
  const total = productos.reduce((acc,p)=> acc + (p.cantidad||0)*(p.precio||0), 0);
  document.getElementById('totalAmount').textContent = fmt(total);

  const recibido = parseFloat(document.getElementById('recibido').value) || 0;
  const vuelto = recibido - total;
  const vEl = document.getElementById('vueltoAmount');
  if(recibido===0){
    vEl.textContent = fmt(0);
    vEl.classList.remove('negativo');
  } else if(vuelto < 0){
    vEl.textContent = '-' + fmt(Math.abs(vuelto));
    vEl.classList.add('negativo');
  } else {
    vEl.textContent = fmt(vuelto);
    vEl.classList.remove('negativo');
  }
}

function alternarTema(){
  const body = document.body;
  const claro = body.classList.toggle('light');
  document.getElementById('temaBtn').textContent = claro ? '☀️' : '🌙';
  try{ localStorage.setItem('tema_pref', claro ? 'light' : 'dark'); }catch(e){}
}
function cargarTema(){
  let pref = null;
  try{ pref = localStorage.getItem('tema_pref'); }catch(e){}
  if(pref === 'light'){
    document.body.classList.add('light');
    document.getElementById('temaBtn').textContent = '☀️';
  }
}

function toggleMenu(){
  document.getElementById('menuDropdown').classList.toggle('show');
}
document.addEventListener('click', function(e){
  const wrap = document.querySelector('.menu-wrap');
  if(wrap && !wrap.contains(e.target)){
    document.getElementById('menuDropdown').classList.remove('show');
  }
});

function cargarHistorial(){
  try{
    const raw = localStorage.getItem('historial_ventas');
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function guardarHistorial(hist){
  try{ localStorage.setItem('historial_ventas', JSON.stringify(hist)); }catch(e){}
}

function guardarVenta(){
  const vendidos = productos.filter(p=>(p.cantidad||0) > 0);
  if(vendidos.length===0){
    mostrarToast('Agrega productos antes de guardar');
    return;
  }
  const nombre = document.getElementById('clienteNombre').value.trim();
  const numero = document.getElementById('clienteNumero').value.trim();
  const total = vendidos.reduce((acc,p)=> acc + (p.cantidad||0)*(p.precio||0), 0);

  const registro = {
    id: 'v_' + Date.now(),
    fecha: new Date().toISOString(),
    cliente: nombre || 'Sin nombre',
    numero: numero || '',
    total: total,
    items: vendidos.map(p=>({nombre:p.nombre||'Producto', cantidad:p.cantidad, precio:p.precio}))
  };

  const hist = cargarHistorial();
  hist.unshift(registro);
  guardarHistorial(hist);

  document.getElementById('clienteNombre').value = '';
  document.getElementById('clienteNumero').value = '';
  limpiarCuenta();
  mostrarToast('Venta guardada en el historial');
}

function fmtFecha(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('es', {day:'2-digit', month:'2-digit', year:'2-digit'}) + ' ' +
         d.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
}

function renderHistorial(){
  const hist = cargarHistorial();
  const cont = document.getElementById('histLista');
  if(hist.length===0){
    cont.innerHTML = '<div class="hist-empty">Todavía no hay ventas guardadas</div>';
    return;
  }
  cont.innerHTML = hist.map(r=>{
    const itemsTxt = r.items.map(it=> `${it.cantidad} x ${it.nombre}`).join(', ');
    return `
      <div class="hist-item">
        <div class="hist-top">
          <span class="hist-cliente">${r.cliente}${r.numero ? ' · '+r.numero : ''}</span>
          <span class="hist-total num">${fmt(r.total)}</span>
        </div>
        <div class="hist-meta">${fmtFecha(r.fecha)}</div>
        <div class="hist-items">${itemsTxt}</div>
        <button class="hist-del" onclick="eliminarVenta('${r.id}')">Eliminar registro</button>
      </div>
    `;
  }).join('') + '<button class="hist-clear" onclick="vaciarHistorial()">Vaciar todo el historial</button>';
}

function eliminarVenta(id){
  let hist = cargarHistorial();
  hist = hist.filter(r=>r.id!==id);
  guardarHistorial(hist);
  renderHistorial();
}

function vaciarHistorial(){
  guardarHistorial([]);
  renderHistorial();
}

function abrirHistorial(){
  document.getElementById('menuDropdown').classList.remove('show');
  renderHistorial();
  document.getElementById('histOverlay').classList.add('show');
}
function cerrarHistorial(){
  document.getElementById('histOverlay').classList.remove('show');
}

cargarTema();
cargarDatos();
</script>

</body>
</html>
